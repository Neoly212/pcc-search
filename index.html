<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政府採購查詢系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e; --paper: #f5f0e8; --accent: #c0392b;
    --muted: #7a7a8a; --border: #d0c8b8; --card-bg: #fdfaf4;
    --blue: #2471a3; --green: #1e8449; --shadow: 0 2px 12px rgba(26,26,46,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Serif TC', serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  header {
    background: var(--ink); color: var(--paper);
    padding: 22px 32px 18px; border-bottom: 4px solid var(--accent);
    position: relative; overflow: hidden;
  }
  header::before {
    content: '採購'; position: absolute; right: 16px; top: -12px;
    font-size: 100px; font-weight: 700; opacity: 0.04; color: #fff;
  }
  .badge {
    background: var(--accent); color: #fff; font-family: 'Space Mono', monospace;
    font-size: 10px; padding: 2px 8px; letter-spacing: 2px; border-radius: 2px;
    display: inline-block; margin-bottom: 6px;
  }
  header h1 { font-size: 22px; font-weight: 700; letter-spacing: 2px; }
  header p { font-size: 11px; opacity: 0.4; font-family: 'Space Mono', monospace; margin-top: 4px; }

  /* API Key panel */
  .key-panel {
    background: #1a1a2e; border-bottom: 1px solid #2c2c4a;
    padding: 14px 32px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .key-label { font-family: 'Space Mono', monospace; font-size: 11px; color: #8888aa; white-space: nowrap; }
  .key-input {
    flex: 1; min-width: 200px; max-width: 420px;
    padding: 7px 12px; border: 1.5px solid #3a3a5a; border-radius: 4px;
    background: #0d0d1a; color: #a0a0cc; font-family: 'Space Mono', monospace;
    font-size: 12px; outline: none; transition: border-color 0.2s;
  }
  .key-input:focus { border-color: var(--accent); color: #fff; }
  .key-status { font-family: 'Space Mono', monospace; font-size: 11px; }
  .key-status.ok  { color: #2ecc71; }
  .key-status.err { color: #e74c3c; }
  .key-hint { font-family: 'Space Mono', monospace; font-size: 10px; color: #555577; }
  .key-hint a { color: #7777bb; }

  /* Search panel */
  .search-panel {
    background: var(--card-bg); border-bottom: 1px solid var(--border);
    padding: 22px 32px; box-shadow: var(--shadow);
  }
  .search-grid {
    display: grid; grid-template-columns: 1fr 1fr 140px;
    gap: 10px; align-items: end; max-width: 820px; margin-bottom: 10px;
  }
  .field-group label {
    display: block; font-size: 10px; font-family: 'Space Mono', monospace;
    color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 5px;
  }
  .field-group input, .field-group select {
    width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
    background: #fff; color: var(--ink); font-family: 'Noto Serif TC', serif;
    font-size: 14px; border-radius: 4px; outline: none; transition: border-color 0.2s;
  }
  .field-group input:focus, .field-group select:focus { border-color: var(--accent); }
  .btn-row { display: flex; gap: 8px; }
  .btn {
    padding: 9px 20px; font-family: 'Noto Serif TC', serif; font-size: 14px;
    font-weight: 700; border: none; border-radius: 4px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #a93226; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
  .hint { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 8px; }
  .hint span { color: var(--accent); }

  /* Status */
  .status-strip {
    display: none; padding: 10px 32px; background: #fff8e1;
    border-bottom: 1px solid #ffe082; font-family: 'Space Mono', monospace;
    font-size: 12px; color: #795548; align-items: center; gap: 8px;
  }
  .status-strip.show { display: flex; }
  .spinner { width: 13px; height: 13px; border: 2px solid #ccc; border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tabs */
  .tabs-bar { padding: 0 32px; background: var(--card-bg); border-bottom: 2px solid var(--border); display: flex; }
  .tab-btn {
    padding: 11px 20px; font-family: 'Noto Serif TC', serif; font-size: 13px; font-weight: 700;
    background: none; border: none; border-bottom: 3px solid transparent; margin-bottom: -2px;
    cursor: pointer; color: var(--muted); transition: all 0.15s; letter-spacing: 1px;
    display: flex; align-items: center; gap: 6px;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .count-badge {
    background: var(--border); color: var(--muted);
    font-family: 'Space Mono', monospace; font-size: 10px; padding: 1px 6px; border-radius: 20px;
  }
  .tab-btn.active .count-badge { background: var(--accent); color: #fff; }

  /* Results */
  .results-area { padding: 22px 32px; max-width: 1040px; }
  .section-header {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--border);
  }
  .section-title { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
  .section-meta { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

  .card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 16px 20px; margin-bottom: 10px; box-shadow: var(--shadow);
    transition: box-shadow .2s, transform .15s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(26,26,46,.12); transform: translateY(-1px); }
  .card-awarded { border-left: 4px solid var(--accent); }
  .card-tender  { border-left: 4px solid var(--blue); }
  .card-tag {
    display: inline-block; font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 1.5px; padding: 2px 7px; border-radius: 3px; margin-bottom: 7px;
  }
  .tag-awarded { background: #fde8e8; color: var(--accent); }
  .tag-tender  { background: #e8f0fe; color: var(--blue); }
  .card-title { font-size: 14px; font-weight: 700; margin-bottom: 9px; line-height: 1.4; }
  .card-title a { color: var(--ink); text-decoration: none; }
  .card-title a:hover { color: var(--accent); }
  .card-meta { display: flex; flex-wrap: wrap; gap: 5px 18px; margin-bottom: 9px; }
  .meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-label { font-family: 'Space Mono', monospace; font-size: 9px; color: #bbb; text-transform: uppercase; letter-spacing: 1px; }
  .meta-value { color: var(--ink); font-weight: 600; font-size: 13px; }
  .meta-value.price { color: var(--accent); font-family: 'Space Mono', monospace; }
  .meta-value.company { color: #1a5276; }
  .card-spec {
    background: #f7f4ee; border-radius: 4px; padding: 8px 12px;
    font-size: 12px; color: #555; line-height: 1.7; border-left: 3px solid var(--border);
  }

  .state-box { text-align: center; padding: 60px 20px; color: var(--muted); }
  .state-icon { font-size: 44px; margin-bottom: 12px; opacity: 0.35; }
  .state-text { font-size: 15px; letter-spacing: 1px; }
  .state-sub  { font-family: 'Space Mono', monospace; font-size: 11px; color: #bbb; margin-top: 6px; }

  .loading-bar { display: none; height: 3px; position: fixed; top: 0; left: 0; right: 0; z-index: 999; background: var(--border); }
  .loading-bar.active { display: block; }
  .loading-bar::after {
    content: ''; display: block; height: 100%; width: 40%; background: var(--accent);
    animation: lslide 1.3s ease-in-out infinite;
  }
  @keyframes lslide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

  .notice { font-family: 'Space Mono', monospace; font-size: 10px; color: #bbb; text-align: center; padding: 14px 0 0; }

  @media (max-width: 640px) {
    header, .key-panel, .search-panel, .status-strip, .tabs-bar, .results-area { padding-left: 14px; padding-right: 14px; }
    .search-grid { grid-template-columns: 1fr 1fr; }
    .key-panel { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="loading-bar" id="loadingBar"></div>

<header>
  <div class="badge">GOV PROCUREMENT · TW</div>
  <h1>政府採購查詢系統</h1>
  <p>資料來源：政府電子採購網 ／ AI 智能搜尋</p>
</header>

<!-- API Key input -->
<div class="key-panel">
  <span class="key-label">🔑 Claude API Key</span>
  <input type="password" class="key-input" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off" oninput="onKeyInput()" />
  <span class="key-status" id="keyStatus"></span>
  <span class="key-hint">沒有 Key？<a href="https://console.anthropic.com/" target="_blank">免費申請 →</a>　Key 只存在瀏覽器，不會上傳到任何伺服器</span>
</div>

<div class="search-panel">
  <div class="search-grid">
    <div class="field-group">
      <label>標案關鍵字（選填）</label>
      <input type="text" id="queryInput" placeholder="例：顯微鏡、資訊系統" />
    </div>
    <div class="field-group">
      <label>廠商名稱（選填）</label>
      <input type="text" id="companyInput" placeholder="例：正茂生物、中華電信" />
    </div>
    <div class="field-group">
      <label>年份</label>
      <select id="yearSelect">
        <option value="">全部</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
        <option value="2022">2022</option>
        <option value="2021">2021</option>
        <option value="2020">2020</option>
      </select>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="searchBtn" onclick="doSearch()">搜　尋</button>
    <button class="btn btn-ghost" onclick="resetSearch()">清除</button>
  </div>
  <div class="hint">💡 廠商名稱支援<span>模糊搜尋</span>（輸入部分名稱即可）；由 Claude AI 搜尋整理，結果更準確</div>
</div>

<div class="status-strip" id="statusStrip">
  <div class="spinner"></div>
  <span id="statusText">AI 搜尋中，請稍候（約 15-30 秒）…</span>
</div>

<div class="tabs-bar" id="tabsBar" style="display:none">
  <button class="tab-btn active" id="tab-awarded" onclick="switchTab('awarded')">
    ✦ 決標公告 <span class="count-badge" id="awardedCount">0</span>
  </button>
  <button class="tab-btn" id="tab-tender" onclick="switchTab('tender')">
    ◈ 招標公告 <span class="count-badge" id="tenderCount">0</span>
  </button>
</div>

<div class="results-area" id="resultsArea">
  <div class="state-box">
    <div class="state-icon">🔍</div>
    <div class="state-text">輸入 API Key 與關鍵字開始搜尋</div>
    <div class="state-sub">由 Claude AI 搜尋政府採購網，支援模糊搜尋</div>
  </div>
</div>

<script>
const CLAUDE_API = 'https://api.anthropic.com/v1/messages';
let currentTab = 'awarded';
let awardedData = [], tenderData = [];

function onKeyInput() {
  const key = document.getElementById('apiKey').value.trim();
  const st = document.getElementById('keyStatus');
  if (!key) { st.textContent = ''; st.className = 'key-status'; return; }
  if (key.startsWith('sk-ant-')) {
    st.textContent = '✓ 格式正確'; st.className = 'key-status ok';
  } else {
    st.textContent = '✗ 格式不正確（應以 sk-ant- 開頭）'; st.className = 'key-status err';
  }
  localStorage.setItem('pcc_api_key', key);
}

// Restore saved key
window.addEventListener('load', () => {
  const saved = localStorage.getItem('pcc_api_key');
  if (saved) { document.getElementById('apiKey').value = saved; onKeyInput(); }
});

function setLoading(on) {
  document.getElementById('loadingBar').classList.toggle('active', on);
  document.getElementById('searchBtn').disabled = on;
  document.getElementById('searchBtn').textContent = on ? '搜尋中…' : '搜　尋';
  document.getElementById('statusStrip').classList.toggle('show', on);
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtMoney(n) { const m=Number(n); return(!m||isNaN(m))?'–':'$ '+m.toLocaleString('zh-TW')+' 元'; }

async function doSearch() {
  const apiKey     = document.getElementById('apiKey').value.trim();
  const query      = document.getElementById('queryInput').value.trim();
  const company    = document.getElementById('companyInput').value.trim();
  const year       = document.getElementById('yearSelect').value;

  if (!apiKey) { alert('請先輸入 Claude API Key'); document.getElementById('apiKey').focus(); return; }
  if (!apiKey.startsWith('sk-ant-')) { alert('API Key 格式不正確'); return; }
  if (!query && !company) { alert('請輸入標案關鍵字或廠商名稱'); return; }

  setLoading(true);
  awardedData = []; tenderData = [];

  try {
    const conditions = [];
    if (query)   conditions.push(`標案名稱包含「${query}」`);
    if (company) conditions.push(`廠商名稱包含「${company}」（部分名稱即可，例如輸入「正茂」可找到「正茂生物科技股份有限公司」）`);
    if (year)    conditions.push(`年份為 ${year} 年`);

    const prompt = `請搜尋台灣政府採購網（web.pcc.gov.tw）上符合以下條件的標案：
${conditions.join('\n')}

搜尋方式：
1. 搜尋「site:web.pcc.gov.tw ${[query, company, year].filter(Boolean).join(' ')}」
2. 搜尋「政府採購 ${[query, company, year].filter(Boolean).join(' ')} 決標」
3. 搜尋「${[query, company, year].filter(Boolean).join(' ')} 採購公告 台灣」

找到資料後，請用以下 JSON 格式回傳，用 <result> 和 </result> 包住：

<result>
[
  {
    "type": "awarded",
    "title": "標案名稱",
    "date": "決標日期（YYYY-MM-DD）",
    "amount": 決標金額數字,
    "companies": ["廠商名稱"],
    "unit": "機關名稱",
    "spec": "規格或說明摘要",
    "link": "原始連結網址"
  }
]
</result>

type 欄位：決標公告用 "awarded"，招標公告用 "tender"
招標公告額外欄位：method（招標方式）
amount 為純數字（無單位）
請盡量找 10-20 筆資料，若找不到資料回傳空陣列 []
只輸出 <result>...</result> 之間的內容，不要加其他說明`;

    const response = await fetch(CLAUDE_API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err?.error?.message || `API 錯誤 ${response.status}`);
    }

    const data = await response.json();

    // Extract text from all content blocks
    const fullText = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n');

    // Parse <result>...</result>
    const match = fullText.match(/<result>([\s\S]*?)<\/result>/);
    let records = [];
    if (match) {
      try {
        const clean = match[1].trim().replace(/```json|```/g, '');
        records = JSON.parse(clean);
      } catch(e) {
        console.warn('Parse error:', e, match[1]);
      }
    }

    // Fallback: find any JSON array in text
    if (!records.length) {
      const arrMatch = fullText.match(/\[[\s\S]*\]/);
      if (arrMatch) {
        try { records = JSON.parse(arrMatch[0]); } catch {}
      }
    }

    awardedData = records.filter(r => r.type === 'awarded');
    tenderData  = records.filter(r => r.type === 'tender');

    document.getElementById('awardedCount').textContent = awardedData.length;
    document.getElementById('tenderCount').textContent  = tenderData.length;
    document.getElementById('tabsBar').style.display = 'flex';

    currentTab = (awardedData.length === 0 && tenderData.length > 0) ? 'tender' : 'awarded';
    updateTabs();
    renderResults();

  } catch(e) {
    showError(e.message);
  } finally {
    setLoading(false);
  }
}

function renderResults() {
  const data = currentTab === 'awarded' ? awardedData : tenderData;
  const area = document.getElementById('resultsArea');

  if (!data.length) {
    area.innerHTML = `<div class="state-box">
      <div class="state-icon">${currentTab==='awarded'?'📋':'📢'}</div>
      <div class="state-text">無符合的${currentTab==='awarded'?'決標':'招標'}公告</div>
      <div class="state-sub">可切換頁籤或調整關鍵字再試</div>
    </div>`; return;
  }

  let html = `<div class="section-header">
    <span class="section-title">${currentTab==='awarded'?'✦ 決標公告':'◈ 招標公告'}</span>
    <span class="section-meta">共 ${data.length} 筆</span>
  </div>`;

  data.forEach(r => { html += currentTab === 'awarded' ? cardAwarded(r) : cardTender(r); });
  html += `<div class="notice">資料由 Claude AI 搜尋整理 ／ 資料來源：政府電子採購網 ／ 僅供參考，請以官方網站為準</div>`;
  area.innerHTML = html;
}

function cardAwarded(r) {
  const cos = Array.isArray(r.companies) ? r.companies.join('、') : (r.companies||'–');
  return `<div class="card card-awarded">
    <span class="card-tag tag-awarded">決　標</span>
    <div class="card-title"><a href="${esc(r.link||'#')}" target="_blank">${esc(r.title||'(無標題)')}</a></div>
    <div class="card-meta">
      <div class="meta-item"><span class="meta-label">決標日期</span><span class="meta-value">${esc(r.date||'–')}</span></div>
      <div class="meta-item"><span class="meta-label">決標金額</span><span class="meta-value price">${fmtMoney(r.amount)}</span></div>
      <div class="meta-item"><span class="meta-label">決標廠商</span><span class="meta-value company">${esc(cos||'–')}</span></div>
      ${r.unit?`<div class="meta-item"><span class="meta-label">機關</span><span class="meta-value">${esc(r.unit)}</span></div>`:''}
    </div>
    ${r.spec?`<div class="card-spec">${esc(r.spec.slice(0,250))}</div>`:''}
  </div>`;
}

function cardTender(r) {
  return `<div class="card card-tender">
    <span class="card-tag tag-tender">招　標</span>
    <div class="card-title"><a href="${esc(r.link||'#')}" target="_blank">${esc(r.title||'(無標題)')}</a></div>
    <div class="card-meta">
      <div class="meta-item"><span class="meta-label">公告日期</span><span class="meta-value">${esc(r.date||'–')}</span></div>
      <div class="meta-item"><span class="meta-label">公告金額</span><span class="meta-value price">${fmtMoney(r.amount)}</span></div>
      ${r.method?`<div class="meta-item"><span class="meta-label">招標方式</span><span class="meta-value">${esc(r.method)}</span></div>`:''}
      ${r.unit?`<div class="meta-item"><span class="meta-label">機關</span><span class="meta-value">${esc(r.unit)}</span></div>`:''}
    </div>
    ${r.spec?`<div class="card-spec">${esc(r.spec.slice(0,250))}</div>`:''}
  </div>`;
}

function switchTab(t) { currentTab=t; updateTabs(); renderResults(); }
function updateTabs() {
  document.getElementById('tab-awarded').classList.toggle('active', currentTab==='awarded');
  document.getElementById('tab-tender').classList.toggle('active', currentTab==='tender');
}
function showError(msg) {
  document.getElementById('resultsArea').innerHTML = `<div class="state-box">
    <div class="state-icon">⚠️</div>
    <div class="state-text">查詢失敗</div>
    <div class="state-sub">${esc(msg)}</div>
  </div>`;
}
function resetSearch() {
  ['queryInput','companyInput'].forEach(id => document.getElementById(id).value='');
  document.getElementById('yearSelect').value='';
  document.getElementById('tabsBar').style.display='none';
  awardedData=[]; tenderData=[];
  document.getElementById('resultsArea').innerHTML = `<div class="state-box">
    <div class="state-icon">🔍</div>
    <div class="state-text">輸入 API Key 與關鍵字開始搜尋</div>
    <div class="state-sub">由 Claude AI 搜尋政府採購網，支援模糊搜尋</div>
  </div>`;
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('searchBtn').disabled) doSearch();
});
</script>
</body>
</html>
