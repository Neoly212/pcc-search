<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政府採購查詢系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e; --paper: #f5f0e8; --accent: #c0392b;
    --muted: #7a7a8a; --border: #d0c8b8; --card-bg: #fdfaf4;
    --blue: #2471a3; --shadow: 0 2px 12px rgba(26,26,46,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Serif TC', serif; background: var(--paper); color: var(--ink); min-height: 100vh; }
  header {
    background: var(--ink); color: var(--paper);
    padding: 22px 32px 18px; border-bottom: 4px solid var(--accent);
    position: relative; overflow: hidden;
  }
  header::before {
    content: '採購'; position: absolute; right: 16px; top: -12px;
    font-size: 100px; font-weight: 700; opacity: 0.04; color: #fff;
  }
  .badge {
    background: var(--accent); color: #fff; font-family: 'Space Mono', monospace;
    font-size: 10px; padding: 2px 8px; letter-spacing: 2px; border-radius: 2px;
    display: inline-block; margin-bottom: 6px;
  }
  header h1 { font-size: 22px; font-weight: 700; letter-spacing: 2px; }
  header p { font-size: 11px; opacity: 0.4; font-family: 'Space Mono', monospace; margin-top: 4px; }

  .search-panel {
    background: var(--card-bg); border-bottom: 1px solid var(--border);
    padding: 22px 32px; box-shadow: var(--shadow);
  }
  .search-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; max-width: 820px; margin-bottom: 12px;
  }
  .search-grid-2 {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; max-width: 820px; margin-bottom: 12px;
  }
  .field-group label {
    display: block; font-size: 10px; font-family: 'Space Mono', monospace;
    color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 5px;
  }
  .field-group input, .field-group select {
    width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
    background: #fff; color: var(--ink); font-family: 'Noto Serif TC', serif;
    font-size: 14px; border-radius: 4px; outline: none; transition: border-color 0.2s;
  }
  .field-group input:focus, .field-group select:focus { border-color: var(--accent); }
  .btn-row { display: flex; gap: 8px; }
  .btn {
    padding: 9px 20px; font-family: 'Noto Serif TC', serif; font-size: 14px;
    font-weight: 700; border: none; border-radius: 4px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #a93226; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
  .btn-ghost:hover { border-color: var(--muted); }
  .hint { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 8px; }
  .hint span { color: var(--accent); }

  .status-strip {
    display: none; padding: 9px 32px; background: #fff8e1;
    border-bottom: 1px solid #ffe082; font-family: 'Space Mono', monospace;
    font-size: 12px; color: #795548; align-items: center; gap: 8px;
  }
  .status-strip.show { display: flex; }
  .spinner { width: 13px; height: 13px; border: 2px solid #ccc; border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tabs-bar { padding: 0 32px; background: var(--card-bg); border-bottom: 2px solid var(--border); display: flex; }
  .tab-btn {
    padding: 11px 20px; font-family: 'Noto Serif TC', serif; font-size: 13px; font-weight: 700;
    background: none; border: none; border-bottom: 3px solid transparent; margin-bottom: -2px;
    cursor: pointer; color: var(--muted); transition: all 0.15s; letter-spacing: 1px;
    display: flex; align-items: center; gap: 6px;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .count-badge {
    background: var(--border); color: var(--muted);
    font-family: 'Space Mono', monospace; font-size: 10px; padding: 1px 6px; border-radius: 20px;
  }
  .tab-btn.active .count-badge { background: var(--accent); color: #fff; }

  .results-area { padding: 22px 32px; max-width: 1040px; }
  .section-header {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--border);
  }
  .section-title { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
  .section-meta { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

  .card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 16px 20px; margin-bottom: 10px; box-shadow: var(--shadow);
    transition: box-shadow .2s, transform .15s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(26,26,46,.12); transform: translateY(-1px); }
  .card-awarded { border-left: 4px solid var(--accent); }
  .card-tender  { border-left: 4px solid var(--blue); }
  .card-tag {
    display: inline-block; font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 1.5px; padding: 2px 7px; border-radius: 3px; margin-bottom: 7px;
  }
  .tag-awarded { background: #fde8e8; color: var(--accent); }
  .tag-tender  { background: #e8f0fe; color: var(--blue); }
  .card-title { font-size: 14px; font-weight: 700; margin-bottom: 9px; line-height: 1.4; }
  .card-title a { color: var(--ink); text-decoration: none; }
  .card-title a:hover { color: var(--accent); }
  .card-meta { display: flex; flex-wrap: wrap; gap: 5px 18px; margin-bottom: 9px; }
  .meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-label { font-family: 'Space Mono', monospace; font-size: 9px; color: #bbb; text-transform: uppercase; letter-spacing: 1px; }
  .meta-value { color: var(--ink); font-weight: 600; font-size: 13px; }
  .meta-value.price { color: var(--accent); font-family: 'Space Mono', monospace; }
  .meta-value.company { color: #1a5276; }

  .state-box { text-align: center; padding: 60px 20px; color: var(--muted); }
  .state-icon { font-size: 44px; margin-bottom: 12px; opacity: 0.35; }
  .state-text { font-size: 15px; letter-spacing: 1px; }
  .state-sub  { font-family: 'Space Mono', monospace; font-size: 11px; color: #bbb; margin-top: 6px; }

  .loading-bar { display: none; height: 3px; position: fixed; top: 0; left: 0; right: 0; z-index: 999; background: var(--border); }
  .loading-bar.active { display: block; }
  .loading-bar::after {
    content: ''; display: block; height: 100%; width: 40%; background: var(--accent);
    animation: lslide 1.3s ease-in-out infinite;
  }
  @keyframes lslide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

  .pagination { display: flex; gap: 6px; align-items: center; margin-top: 18px; justify-content: center; flex-wrap: wrap; }
  .page-btn {
    padding: 5px 11px; border: 1.5px solid var(--border); background: var(--card-bg);
    color: var(--ink); font-family: 'Space Mono', monospace; font-size: 12px;
    border-radius: 4px; cursor: pointer; transition: all .15s;
  }
  .page-btn:hover { border-color: var(--accent); color: var(--accent); }
  .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .page-btn:disabled { opacity: .4; cursor: not-allowed; }
  .notice { font-family: 'Space Mono', monospace; font-size: 10px; color: #bbb; text-align: center; padding: 14px 0 0; }

  @media (max-width: 640px) {
    header, .search-panel, .status-strip, .tabs-bar, .results-area { padding-left: 14px; padding-right: 14px; }
    .search-grid, .search-grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="loading-bar" id="loadingBar"></div>
<header>
  <div class="badge">GOV PROCUREMENT · TW</div>
  <h1>政府採購查詢系統</h1>
  <p>資料來源：政府電子採購網 web.pcc.gov.tw（官方）</p>
</header>

<div class="search-panel">
  <div class="search-grid">
    <div class="field-group">
      <label>標案名稱關鍵字（選填）</label>
      <input type="text" id="tenderName" placeholder="例：資訊系統、道路工程" />
    </div>
    <div class="field-group">
      <label>廠商名稱（選填，模糊）</label>
      <input type="text" id="companyName" placeholder="例：正茂生物、中華電信" />
    </div>
  </div>
  <div class="search-grid-2">
    <div class="field-group">
      <label>開始日期</label>
      <input type="date" id="startDate" />
    </div>
    <div class="field-group">
      <label>結束日期</label>
      <input type="date" id="endDate" />
    </div>
    <div class="field-group">
      <label>每頁筆數</label>
      <select id="pageSize">
        <option value="20">20 筆</option>
        <option value="50">50 筆</option>
        <option value="100">100 筆</option>
      </select>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="searchBtn" onclick="doSearch()">搜　尋</button>
    <button class="btn btn-ghost" onclick="resetSearch()">清除</button>
  </div>
  <div class="hint" style="margin-top:10px">💡 廠商名稱輸入<span>部分名稱</span>即可模糊搜尋；日期留空則搜尋全部</div>
</div>

<div class="status-strip" id="statusStrip">
  <div class="spinner"></div>
  <span id="statusText">搜尋中…</span>
</div>

<div class="tabs-bar" id="tabsBar" style="display:none">
  <button class="tab-btn active" id="tab-awarded" onclick="switchTab('awarded')">
    ✦ 決標公告 <span class="count-badge" id="awardedCount">0</span>
  </button>
  <button class="tab-btn" id="tab-tender" onclick="switchTab('tender')">
    ◈ 招標公告 <span class="count-badge" id="tenderCount">0</span>
  </button>
</div>

<div class="results-area" id="resultsArea">
  <div class="state-box">
    <div class="state-icon">🔍</div>
    <div class="state-text">輸入關鍵字開始搜尋</div>
    <div class="state-sub">標案名稱 ／ 廠商名稱 ／ 日期 可單獨或組合使用</div>
  </div>
</div>

<script>
const PROXY = '/api/proxy';
let currentTab = 'awarded';
let awardedData = [], tenderData = [];
let awardedPage = 1, tenderPage = 1;
let totalAwarded = 0, totalTender = 0;
const PAGE_SIZE_VAL = () => Number(document.getElementById('pageSize').value) || 20;

// Set default dates to current year
const now = new Date();
const y = now.getFullYear();
document.getElementById('startDate').value = `${y}-01-01`;
document.getElementById('endDate').value   = `${y}-12-31`;

function setLoading(on) {
  document.getElementById('loadingBar').classList.toggle('active', on);
  document.getElementById('searchBtn').disabled = on;
  document.getElementById('searchBtn').textContent = on ? '搜尋中…' : '搜　尋';
  document.getElementById('statusStrip').classList.toggle('show', on);
}
function setStatus(msg) { document.getElementById('statusText').textContent = msg; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtMoney(n) { const m=Number(n); return(!m||isNaN(m))?'–':'$ '+m.toLocaleString('zh-TW')+' 元'; }
function fmtDate(s) {
  if (!s) return '–';
  // Handle formats: 20240101, 2024/01/01, 2024-01-01
  const str = String(s).replace(/\//g,'-');
  if (str.length === 8) return `${str.slice(0,4)}-${str.slice(4,6)}-${str.slice(6,8)}`;
  return str;
}

async function apiFetch(params, type) {
  const q = new URLSearchParams({ ...params, type });
  const r = await fetch(`${PROXY}?${q.toString()}`, { signal: AbortSignal.timeout(15000) });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const text = await r.text();
  try { return JSON.parse(text); } catch(e) {
    console.error('Parse error, raw:', text.slice(0, 300));
    throw new Error('回應格式錯誤，請稍後再試');
  }
}

function buildParams() {
  const p = {};
  const tenderName  = document.getElementById('tenderName').value.trim();
  const companyName = document.getElementById('companyName').value.trim();
  const startDate   = document.getElementById('startDate').value;
  const endDate     = document.getElementById('endDate').value;
  const pageSize    = PAGE_SIZE_VAL();

  if (tenderName)  p.tenderName  = tenderName;
  if (companyName) p.companyName = companyName;
  if (startDate)   p.startDate   = startDate.replace(/-/g, '/');
  if (endDate)     p.endDate     = endDate.replace(/-/g, '/');
  p.pageSize  = pageSize;
  p.pageIndex = 1;
  return p;
}

async function doSearch() {
  const tenderName  = document.getElementById('tenderName').value.trim();
  const companyName = document.getElementById('companyName').value.trim();
  if (!tenderName && !companyName) { alert('請輸入標案名稱或廠商名稱'); return; }

  setLoading(true);
  awardedData=[]; tenderData=[];
  awardedPage=1; tenderPage=1;

  try {
    const params = buildParams();

    // Fetch both award and tender in parallel
    setStatus('查詢決標與招標公告中…');
    const [awardRes, tenderRes] = await Promise.allSettled([
      apiFetch(params, 'award'),
      apiFetch(params, 'tender'),
    ]);

    // Parse awarded results
    if (awardRes.status === 'fulfilled') {
      const d = awardRes.value;
      // API may return: { totalCount, records: [...] } or { data: [...] } or [...]
      awardedData = d?.records || d?.data || d?.tenderList || d?.list || (Array.isArray(d) ? d : []);
      totalAwarded = d?.totalCount || d?.total || awardedData.length;
    } else {
      console.warn('Award fetch failed:', awardRes.reason);
    }

    // Parse tender results
    if (tenderRes.status === 'fulfilled') {
      const d = tenderRes.value;
      tenderData = d?.records || d?.data || d?.tenderList || d?.list || (Array.isArray(d) ? d : []);
      totalTender = d?.totalCount || d?.total || tenderData.length;
    } else {
      console.warn('Tender fetch failed:', tenderRes.reason);
    }

    document.getElementById('awardedCount').textContent = totalAwarded || awardedData.length;
    document.getElementById('tenderCount').textContent  = totalTender  || tenderData.length;
    document.getElementById('tabsBar').style.display = 'flex';

    currentTab = (awardedData.length===0 && tenderData.length>0) ? 'tender' : 'awarded';
    updateTabs();
    renderResults();

  } catch(e) {
    showError(e.message);
  } finally {
    setLoading(false);
  }
}

// ── Field extractors — handles official PCC API response format ────────────
// Official API fields (based on web.pcc.gov.tw structure):
function T(r, ...keys) {
  for (const k of keys) { if (r[k] !== undefined && r[k] !== null && r[k] !== '') return r[k]; }
  return '';
}
function getTitle(r)     { return T(r,'tenderName','title','name'); }
function getDate(r)      { return fmtDate(T(r,'tenderAwardDate','awardDate','tenderOpenDate','publishDate','date')); }
function getOrg(r)       { return T(r,'orgName','unitName','unit','organization'); }
function getCompany(r)   {
  // Award records often have merchants/companies array
  if (r.merchants?.length) return r.merchants.map(m=>m.name||m.merchantName||'').filter(Boolean).join('、');
  if (r.companies?.length) return r.companies.map(c=>c.name||'').filter(Boolean).join('、');
  return T(r,'companyName','merchantName','vendor','company');
}
function getAmount(r) {
  const n = Number(T(r,'tenderAwardPrice','awardPrice','totalPrice','price','budget','tenderBudgetPrice'));
  return fmtMoney(n);
}
function getBudget(r) {
  const n = Number(T(r,'tenderBudgetPrice','budget','price','tenderBasePrice'));
  return fmtMoney(n);
}
function getMethod(r)    { return T(r,'tenderWay','procurementMethod','tenderMethod','method'); }
function getLink(r) {
  const id = T(r,'tenderId','tenderID','id');
  const unit = T(r,'orgId','unitId','unit_id');
  const job = T(r,'jobNumber','job_number','tenderCaseNo');
  if (id) return `https://web.pcc.gov.tw/prkms/tender/common/basicSearch/readTenderBasic?tenderCaseNo=${encodeURIComponent(id)}`;
  if (unit && job) return `https://web.pcc.gov.tw/tps/pss/tender.do?newEdit=false&searchMode=common&pk=${encodeURIComponent(unit+job)}`;
  return '#';
}

function renderResults() {
  const data = currentTab==='awarded' ? awardedData : tenderData;
  const page = currentTab==='awarded' ? awardedPage : tenderPage;
  const total = currentTab==='awarded' ? totalAwarded : totalTender;
  const area = document.getElementById('resultsArea');

  if (!data.length) {
    area.innerHTML=`<div class="state-box">
      <div class="state-icon">${currentTab==='awarded'?'📋':'📢'}</div>
      <div class="state-text">無符合的${currentTab==='awarded'?'決標':'招標'}公告</div>
      <div class="state-sub">可切換頁籤或調整搜尋條件再試</div>
    </div>`; return;
  }

  let html=`<div class="section-header">
    <span class="section-title">${currentTab==='awarded'?'✦ 決標公告':'◈ 招標公告'}</span>
    <span class="section-meta">共 ${total||data.length} 筆 ／ 第 ${page} 頁</span>
  </div>`;

  data.forEach(r=>{ html += currentTab==='awarded' ? cardAwarded(r) : cardTender(r); });

  html+=`<div class="pagination">`;
  if (page > 1) html+=`<button class="page-btn" onclick="changePage(${page-1})">← 上一頁</button>`;
  html+=`<span style="font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);padding:0 8px">第 ${page} 頁</span>`;
  if (data.length >= PAGE_SIZE_VAL()) html+=`<button class="page-btn" onclick="changePage(${page+1})">下一頁 →</button>`;
  html+=`</div>`;

  html+=`<div class="notice">資料來源：政府電子採購網 web.pcc.gov.tw ／ 僅供參考，請以官方網站為準</div>`;
  area.innerHTML=html;
}

function cardAwarded(r) {
  const co = getCompany(r), org = getOrg(r);
  return `<div class="card card-awarded">
    <span class="card-tag tag-awarded">決　標</span>
    <div class="card-title"><a href="${esc(getLink(r))}" target="_blank">${esc(getTitle(r)||'(無標題)')}</a></div>
    <div class="card-meta">
      <div class="meta-item"><span class="meta-label">決標日期</span><span class="meta-value">${esc(getDate(r))}</span></div>
      <div class="meta-item"><span class="meta-label">決標金額</span><span class="meta-value price">${getAmount(r)}</span></div>
      <div class="meta-item"><span class="meta-label">決標廠商</span><span class="meta-value company">${esc(co||'–')}</span></div>
      ${org?`<div class="meta-item"><span class="meta-label">機關</span><span class="meta-value">${esc(org)}</span></div>`:''}
    </div>
  </div>`;
}
function cardTender(r) {
  const org=getOrg(r), method=getMethod(r);
  return `<div class="card card-tender">
    <span class="card-tag tag-tender">招　標</span>
    <div class="card-title"><a href="${esc(getLink(r))}" target="_blank">${esc(getTitle(r)||'(無標題)')}</a></div>
    <div class="card-meta">
      <div class="meta-item"><span class="meta-label">公告日期</span><span class="meta-value">${esc(getDate(r))}</span></div>
      <div class="meta-item"><span class="meta-label">預算金額</span><span class="meta-value price">${getBudget(r)}</span></div>
      ${method?`<div class="meta-item"><span class="meta-label">招標方式</span><span class="meta-value">${esc(method)}</span></div>`:''}
      ${org?`<div class="meta-item"><span class="meta-label">機關</span><span class="meta-value">${esc(org)}</span></div>`:''}
    </div>
  </div>`;
}

async function changePage(p) {
  if (currentTab==='awarded') awardedPage=p; else tenderPage=p;
  setLoading(true);
  setStatus(`載入第 ${p} 頁…`);
  try {
    const params = { ...buildParams(), pageIndex: p };
    const d = await apiFetch(params, currentTab==='awarded'?'award':'tender');
    const list = d?.records||d?.data||d?.tenderList||d?.list||(Array.isArray(d)?d:[]);
    if (currentTab==='awarded') { awardedData=list; totalAwarded=d?.totalCount||d?.total||list.length; }
    else { tenderData=list; totalTender=d?.totalCount||d?.total||list.length; }
    document.getElementById('awardedCount').textContent = totalAwarded||awardedData.length;
    document.getElementById('tenderCount').textContent  = totalTender||tenderData.length;
    renderResults();
    window.scrollTo({top:0,behavior:'smooth'});
  } catch(e) { showError(e.message); }
  finally { setLoading(false); }
}

function switchTab(t) { currentTab=t; if(t==='awarded')awardedPage=1;else tenderPage=1; updateTabs(); renderResults(); }
function updateTabs() {
  document.getElementById('tab-awarded').classList.toggle('active',currentTab==='awarded');
  document.getElementById('tab-tender').classList.toggle('active',currentTab==='tender');
}
function showError(msg) {
  document.getElementById('resultsArea').innerHTML=`<div class="state-box">
    <div class="state-icon">⚠️</div><div class="state-text">查詢失敗</div>
    <div class="state-sub">${esc(msg)}</div>
  </div>`;
}
function resetSearch() {
  document.getElementById('tenderName').value='';
  document.getElementById('companyName').value='';
  document.getElementById('startDate').value=`${y}-01-01`;
  document.getElementById('endDate').value=`${y}-12-31`;
  document.getElementById('tabsBar').style.display='none';
  awardedData=[];tenderData=[];
  document.getElementById('resultsArea').innerHTML=`<div class="state-box">
